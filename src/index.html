<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Generative String</title>
    <link type="text/css" rel="stylesheet" href="styles/index.css" />
    <script type="module" src="scripts/main.ts"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="author" content="Yossi Kolesnicov" />
    <meta
      name="description"
      content="An app to design and help produce string art projects"
    />
    <meta name="theme-color" content="#262629" />
    <link
      rel="icon"
      type="image/png"
      href="favicon/favicon-16.png"
      sizes="16x16"
    />
    <link
      rel="icon"
      type="image/png"
      href="favicon/favicon-32.png"
      sizes="32x32"
    />
    <link
      rel="icon"
      type="image/png"
      href="favicon/favicon-96.png"
      sizes="96x96"
    />
    <link
      rel="apple-touch-icon-precomposed"
      type="image/png"
      href="favicon/favicon-152.png"
      sizes="152x152"
    />
    <link
      rel="icon"
      type="image/png"
      href="favicon/favicon-196.png"
      sizes="196x196"
    />
    <link rel="manifest" href="./manifest.webmanifest" />
  </head>
  <body class="dialog_design">
    <main hidden data-is-template="unknown" data-is-default-config="unknown">
      <header id="main_header">
        <a id="header_logo" href="/" style="text-decoration: none;">
          <h1 style="display: flex; align-items: center; gap: 12px; margin: 0;">
            <img src="images/StringArtStudio_AppIcon_Final.svg" alt="Icon" style="height: 38px; width: 38px; border: 3px solid #000; box-shadow: 3px 3px 0px #000; background: #FF6B6B;" />
            <div class="logo_text" style="display: flex; flex-direction: column; line-height: 0.95; font-family: var(--font-display); font-weight: 900; text-transform: uppercase;">
              <span style="font-size: 20px; color: #000; -webkit-text-stroke: 1.5px #000; text-shadow: 2px 2px 0px #FFD93D; letter-spacing: -0.02em;">StringArt</span>
              <span style="font-size: 14px; color: #FF6B6B; -webkit-text-stroke: 1px #000; text-shadow: 1.5px 1.5px 0px #000; letter-spacing: 0.05em; margin-top: 2px;">Studio</span>
            </div>
          </h1>
        </a>

        <div class="header_controls pattern_only" hidden>
          <button
            type="button"
            id="save_btn"
            class="circular_btn non-default-config-only template-only"
            title="Save this pattern"
          >
            <i class="icon-diskette_b"></i>
          </button>
          <dropdown-menu id="pattern_menu" button-style="padding: 0">
            <span slot="label" class="circular_btn">
              <i class="icon-options"></i>
            </span>
            <dropdown-menu-item
              value="save"
              icon="diskette_b"
              class="non-default-config-only non-template-only"
            >
              <i slot="icon" class="icon-diskette_b"></i>
              Save
            </dropdown-menu-item>
            <dropdown-menu-item value="save_as" class="non-default-config-only">
              <i slot="icon" class="icon-plus"></i>
              Save as...</dropdown-menu-item
            >
            <dropdown-menu-item value="rename" class="non-template-only">
              <i slot="icon" class="icon-pencil"></i> Rename</dropdown-menu-item
            >
            <dropdown-menu-item value="delete" class="non-template-only">
              <i slot="icon" class="icon-trash"></i>
              Delete</dropdown-menu-item
            >
            <dropdown-menu-separator
              class="non-template-only"
            ></dropdown-menu-separator>

            <dropdown-menu-item value="download">
              <i slot="icon" class="icon-download"></i>
              Download</dropdown-menu-item>
            <dropdown-menu-item value="share" id="share_menu_item">
              <i slot="icon" class="icon-share"></i>
              Share</dropdown-menu-item
            >
          </dropdown-menu>
          <button
            id="back_to_gallery_btn"
            class="circular_btn"
            title="Back to gallery"
          >
            <i class="icon-arrow_left"></i>
          </button>
        </div>
      </header>
      <!-- LANDING / GALLERY VIEW -->
      <section id="landing_view">
        <div class="landing_header">
          <div class="landing_logo" style="display: flex; flex-direction: column; align-items: center; gap: 16px;">
            <img src="images/StringArtStudio_AppIcon_Final.svg" alt="StringArt Studio Icon" style="height: 140px; width: 140px; border: 6px solid #000; box-shadow: 10px 10px 0px #000; background: #FFD93D; margin-bottom: 8px;" />
            <div style="display: flex; flex-direction: column; line-height: 0.85; font-family: var(--font-display); font-weight: 900; text-transform: uppercase; text-align: center;">
              <span style="font-size: clamp(36px, 7vw, 64px); color: #000; -webkit-text-stroke: 3px #000; text-shadow: 6px 6px 0px #FFD93D; letter-spacing: -0.03em;">StringArt</span>
              <span style="font-size: clamp(24px, 5vw, 40px); color: #FF6B6B; -webkit-text-stroke: 2px #000; text-shadow: 4px 4px 0px #000; letter-spacing: 0.05em; margin-top: 8px;">Studio</span>
            </div>
          </div>
          <p class="landing_tagline">Design beautiful string art patterns</p>
        </div>

        <div class="landing_gallery_header">
          <h2 class="gallery_title">Pick a Pattern</h2>
          <p class="gallery_subtitle">Choose a design to start creating</p>
        </div>

        <div class="landing_gallery_wrap">
          <div id="landing_patterns_container"></div>
        </div>
      </section>
      <form id="design" class="noprint open">
        <div class="expandable_handle" title="Drag to resize">▲</div>
        <menu id="controls_menu" class="pattern_only">
          <a href="#controls_top" class="controls_menu_item circular_btn">
            <i class="icon-options"></i>
          </a>
          <a href="#control_colorGroup" class="controls_menu_item circular_btn">
            <span class="color-wheel-icon"></span>
          </a>
          <a href="#control_strings" class="controls_menu_item circular_btn">
            <i class="icon-thread"></i>
          </a>
          <a href="#control_nails" class="controls_menu_item circular_btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="8" y="2" width="8" height="4" rx="1" />
              <path d="M12 6v14" />
              <path d="M10 20l2 2 2-2" />
            </svg>
          </a>
          <button
            id="controls_reset_btn"
            class="controls_menu_item circular_btn"
            title="Reset to default settings"
          >
            <i class="icon-refresh"></i>
          </button>
        </menu>
        <div id="controls_panel" class="pattern_only">
          <div id="controls"></div>
        </div>
      </form>
      <div id="info" class="pattern_only noprint">
        <h3 class="small_title">Info</h3>
        <label for="info_dimensions_select">Size:</label>
        <select id="info_dimensions_select"></select>
        <dimensions-input
          id="info_dimensions"
          floating-points="1"
          min-width="5"
          min-height="5"
          max-width="200"
          max-height="200"
          hidden
        ></dimensions-input>
        <input
          type="range"
          id="info_size_range"
          min="20"
          max="200"
          step="10"
          hidden
        />
        <span id="info_size_range_display"></span>
        <dl class="info__data">
          <div>
            <dt>Nails count</dt>
            <dd><span id="nails_count"></span></dd>
          </div>
          <div>
            <dt>Max density</dt>
            <dd id="closest_distance_between_nails"></dd>
          </div>
        </dl>
        <h4>Thread length <i class="icon-thread" style="margin-left: 8px;"></i></h4>
        <dl class="info__data">
          <dt>Total length</dt>
          <dd><span id="threads_total_length"></span></dd>
        </dl>
        <h5>Length per color:</h5>
        <ul id="threads_per_color"></ul>
      </div>
      <article id="canvas_panel" class="pattern_only"></article>
      <nav id="instructions" class="noprint pattern_only">
        <!-- <div id="player_controls_and_position"> -->

        <div id="player_continuous" class="player_controls">
          <div id="player_buttons">
            <button id="play_btn" class="circular_btn" title="Play">
              <i class="icon-play"></i>
            </button>
            <button id="pause_btn" class="circular_btn">
              <i class="icon-pause"></i>
            </button>
          </div>
          <div id="player_track">
            <input id="player_position" type="range" min="1" step="1" />
          </div>
          <div id="player_text">
            <span id="step"></span>
          </div>
        </div>
        <div id="player_steps" class="player_controls">
          <div id="player_steps_controls">
            <button id="player_start_btn" class="circular_btn" hidden>
              Start
            </button>
            <button
              id="player_prev_btn"
              class="circular_btn"
              title="Back one step"
            >
              <i class="icon-step_back"></i>
            </button>
            <div id="player_step_directions">
              <div
                id="player_step_directions_from"
                class="player_step_directions_number"
              ></div>
              <div id="player_step_directions_arrow">→</div>
              <div
                id="player_step_directions_to"
                class="player_step_directions_number"
              ></div>
            </div>
            <button
              id="player_next_btn"
              class="circular_btn"
              title="Forward one step"
            >
              <i class="icon-step_forward"></i>
            </button>
          </div>
          <div id="player_steps_close">
            <button
              id="player_instructions_toggle_btn"
              class="circular_btn"
              title="Close"
            >
              <i class="icon-x"></i>
            </button>
          </div>
        </div>
      </nav>
      <download-dialog id="download_dialog"> </download-dialog>
      <download-instructions-dialog
        id="download_instructions_dialog"
      ></download-instructions-dialog>

    </main>
    <noscript>Please enable JavaScript to run this app!</noscript>
  </body>
</html>
