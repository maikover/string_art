<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" class="stringart-svg"><defs><style>@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&amp;display=swap');</style></defs><svg id="svg-base-source" class="stringart-svg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                                <polygon class="svg-shadow" points="250,30 360,60 440,140 470,250 440,360 360,440 250,470 140,440 60,360 30,250 60,140 140,60" transform="translate(14, 14)" fill="#000000"/>
                                
